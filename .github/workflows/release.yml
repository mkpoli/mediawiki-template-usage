name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        uses: hustcer/setup-moonbit@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show tool versions
        run: |
          moon version --all

      - name: Refresh package metadata
        run: |
          moon info

      - name: Format project
        run: |
          moon fmt

      - name: Run tests
        run: |
          moon test --target native

      - name: Build release binary
        run: |
          moon run --target native --release --build-only cmd/main

      - name: Package release artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-dev}"
          OS_NAME="$(printf '%s' "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
          ARCH_NAME="$(printf '%s' "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          ARTIFACT_BASENAME="mediawiki-template-usage-${TAG_NAME}-${OS_NAME}-${ARCH_NAME}"
          mkdir -p dist/package
          cp _build/native/release/build/cmd/main/main.exe "dist/package/mediawiki-template-usage"
          cp README.md LICENSE dist/package/
          tar -C dist/package -czf "dist/${ARTIFACT_BASENAME}.tar.gz" .
          sha256sum "dist/${ARTIFACT_BASENAME}.tar.gz" > "dist/${ARTIFACT_BASENAME}.tar.gz.sha256"

      - name: Package release artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tagName = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'dev' }
          $osName = $env:RUNNER_OS.ToLowerInvariant()
          $archName = $env:RUNNER_ARCH.ToLowerInvariant()
          $artifactBaseName = "mediawiki-template-usage-$tagName-$osName-$archName"
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item _build/native/release/build/cmd/main/main.exe dist/package/mediawiki-template-usage.exe
          Copy-Item README.md, LICENSE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath "dist/$artifactBaseName.zip" -Force
          $hash = (Get-FileHash "dist/$artifactBaseName.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $artifactBaseName.zip" | Out-File -Encoding ascii "dist/$artifactBaseName.zip.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediawiki-template-usage-${{ matrix.os }}
          path: dist/*

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mediawiki-template-usage-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
