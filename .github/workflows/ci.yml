name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        uses: hustcer/setup-moonbit@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show tool versions
        run: |
          moon version --all

      - name: Refresh package metadata
        run: |
          moon info

      - name: Format project
        run: |
          moon fmt

      - name: Run tests
        run: |
          moon test --target native

      - name: Build native CLI
        run: |
          moon run --target native --release --build-only cmd/main
