name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          moon version --all

      - name: Refresh package metadata
        run: |
          moon info

      - name: Format project
        run: |
          moon fmt

      - name: Run tests
        run: |
          moon test --target native

      - name: Build native CLI
        run: |
          moon run --target native --release --build-only cmd/main
